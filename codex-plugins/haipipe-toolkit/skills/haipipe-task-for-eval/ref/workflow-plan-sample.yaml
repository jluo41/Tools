# workflow-plan-sample.yaml — eval task script-level plan
# Schema: project/haipipe-workflow/ref/plan-schema.md
# Task-level template: ../../haipipe-task/ref/workflow-template.yaml
#
# Typical eval phases: Load → Score → Compare → Emit
# All outputs light (results/<run>/), no _WorkSpace writes.

# ─── Header ──────────────────────────────────────────────────────
name: eval-<MODEL>-<SPLIT>
purpose: "Score <MODEL> on <SPLIT>; produce metrics + comparison"
skill: haipipe-task-for-eval

# ─── I: Input ────────────────────────────────────────────────────
input:
  args:
    config: configs/<RUN>.yaml
    model_path: <_WorkSpace path to ModelInstance or Endpoint_Set>
    aidata_path: <_WorkSpace path to AIData>
  files_in:
    - <NN>_<TASK>.py
    - configs/<RUN>.yaml
    - _WorkSpace/4-AIDataStore/<AIDATA>
    - _WorkSpace/5-ModelInstanceStore/<MODEL>

# ─── P: Phases ───────────────────────────────────────────────────
phases:

  - title: Load
    detail: "load model + data, prepare test split"
    steps:
      - label: "load:aidata"
        type: agent
        required: true
        prompt: "Load AIDataSet, materialize test split"
        files_in:
          - _WorkSpace/4-AIDataStore/<AIDATA>
        files_out: []

      - label: "load:model"
        type: agent
        required: true
        prompt: "Load trained ModelInstance"
        files_in:
          - _WorkSpace/5-ModelInstanceStore/<MODEL>
        files_out: []

  - title: Score
    detail: "run inference, compute policy scores"
    steps:
      - label: "score:infer"
        type: agent
        required: true
        prompt: "Run model.infer() on test split → score matrix"
        files_in: []
        files_out: []

      - label: "score:policy"
        type: agent
        required: true
        prompt: "Apply policy routing (e.g. age-routed argmax) → per-row policy assignment"
        files_in: []
        files_out: []

  - title: Compare
    detail: "compute estimator, bootstrap CI, adjudicate"
    steps:
      - label: "compare:estimator"
        type: agent
        required: true
        prompt: "Compute DR/IPW/DM estimator for treatment vs baseline"
        files_in: []
        files_out: []

      - label: "compare:bootstrap"
        type: agent
        required: true
        prompt: "Bootstrap CI on paired delta → confirmed/refuted/inconclusive"
        files_in: []
        files_out: []

  - title: Emit
    detail: "write metrics.json, runtime.yaml, comparison table"
    steps:
      - label: "emit:metrics"
        type: agent
        required: true
        prompt: "Write CI-aware metrics.json per metrics-json-schema.md"
        files_in: []
        files_out:
          - results/<RUN>/metrics.json
          - results/<RUN>/runtime.yaml
          - results/<RUN>/policy_comparison.md

# ─── O: Output ───────────────────────────────────────────────────
output:
  returns:
    status: ok
    verdict: <confirmed | refuted | inconclusive>
  files_out:
    - results/<RUN>/metrics.json
    - results/<RUN>/runtime.yaml
    - results/<RUN>/policy_comparison.md
