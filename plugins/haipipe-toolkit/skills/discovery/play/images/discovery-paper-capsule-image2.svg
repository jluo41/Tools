<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Discovery Paper Capsule</title>
  <desc id="desc">A paper is compressed into role, method, data, metrics, finding, use, and limit fields inside one discovery markdown file.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#243746"/>
    </marker>
    <style>
      .bg { fill: #f5f7f8; }
      .paper { fill: #fff8d8; stroke: #9a7b1f; stroke-width: 2.5; rx: 18; }
      .note { fill: #ffffff; stroke: #243746; stroke-width: 2.5; rx: 18; }
      .field { fill: #edf4f7; stroke: #9fb3bf; stroke-width: 1.5; rx: 12; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2a33; }
      .text { font-family: Inter, Arial, sans-serif; font-size: 17px; fill: #31424f; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 15px; fill: #52636f; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #243746; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; fill: #31424f; }
      .line { stroke: #243746; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text x="72" y="72" class="title">Important papers become capsules, not folders</text>
  <text x="72" y="104" class="text">Discovery keeps the source introduction inside the same clean markdown note.</text>

  <rect class="paper" x="80" y="200" width="260" height="250"/>
  <text x="112" y="246" class="label">Paper Source</text>
  <text x="112" y="284" class="text">Hou et al. 2024</text>
  <text x="112" y="318" class="small">LLMs as zero-shot rankers</text>
  <text x="112" y="366" class="small">Read for:</text>
  <text x="112" y="394" class="small">method, setting, limits</text>

  <rect class="note" x="470" y="122" width="610" height="476"/>
  <text x="510" y="166" class="label">discoveries/group/01_question.md</text>
  <text x="510" y="204" class="mono">### P1. Hou et al. 2024</text>

  <rect class="field" x="510" y="232" width="240" height="64"/>
  <text x="532" y="260" class="label">Role</text>
  <text x="532" y="285" class="small">method anchor</text>

  <rect class="field" x="790" y="232" width="240" height="64"/>
  <text x="812" y="260" class="label">Method</text>
  <text x="812" y="285" class="small">ranking + permutation</text>

  <rect class="field" x="510" y="320" width="240" height="64"/>
  <text x="532" y="348" class="label">Data / Setting</text>
  <text x="532" y="373" class="small">where it was tested</text>

  <rect class="field" x="790" y="320" width="240" height="64"/>
  <text x="812" y="348" class="label">Metrics</text>
  <text x="812" y="373" class="small">how evidence is measured</text>

  <rect class="field" x="510" y="408" width="240" height="64"/>
  <text x="532" y="436" class="label">Finding</text>
  <text x="532" y="461" class="small">what the paper shows</text>

  <rect class="field" x="790" y="408" width="240" height="64"/>
  <text x="812" y="436" class="label">Use Here</text>
  <text x="812" y="461" class="small">how it informs our probe</text>

  <rect class="field" x="510" y="496" width="520" height="64"/>
  <text x="532" y="524" class="label">Limit</text>
  <text x="592" y="524" class="small">what it does not prove for this project</text>

  <path class="line" d="M342 325 C410 325 420 300 465 278"/>
  <text x="374" y="286" class="small">compress into capsule</text>
</svg>
