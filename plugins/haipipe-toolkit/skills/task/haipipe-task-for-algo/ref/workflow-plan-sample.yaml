# workflow-plan-sample.yaml — algo-dev task script-level plan
# Schema: project/haipipe-workflow/ref/plan-schema.md
# Task-level template: ../haipipe-task/ref/workflow-template.yaml
#
# Typical algo phases: Setup → SmokeTest → Verify
# Tiny config, minutes not hours. No heavy outputs. Proves the class works.

# ─── Header ──────────────────────────────────────────────────────
name: smoke-<ALGO>
purpose: "Verify <ALGO> class runs end-to-end on tiny config"
skill: haipipe-task-for-algo

# ─── I: Input ────────────────────────────────────────────────────
input:
  args:
    config: configs/<RUN>.yaml
    algo: <algorithm class name>
  files_in:
    - <NN>_<TASK>.py
    - configs/<RUN>.yaml
    - _WorkSpace/4-AIDataStore/<TINY_AIDATA>

# ─── P: Phases ───────────────────────────────────────────────────
phases:

  - title: Setup
    detail: "load tiny data, instantiate model"
    steps:
      - label: "setup:load"
        type: agent
        required: true
        prompt: "Load tiny AIData slice for smoke test"
        files_in:
          - _WorkSpace/4-AIDataStore/<TINY_AIDATA>
        files_out: []

      - label: "setup:instantiate"
        type: agent
        required: true
        prompt: "Instantiate <ALGO> class with minimal config"
        files_in:
          - configs/<RUN>.yaml
        files_out: []

  - title: SmokeTest
    detail: "run one batch, check loss decreases"
    steps:
      - label: "smoke:forward"
        type: agent
        required: true
        prompt: "Run forward pass on one batch — no crash"
        files_in: []
        files_out: []

      - label: "smoke:train-step"
        type: agent
        required: true
        prompt: "Run 2-3 training steps, verify loss decreases"
        files_in: []
        files_out: []

  - title: Verify
    detail: "check output shapes and write summary"
    steps:
      - label: "verify:shapes"
        type: agent
        required: true
        prompt: "Assert output tensor shapes match spec"
        files_in: []
        files_out: []

      - label: "verify:summary"
        type: agent
        required: true
        prompt: "Write smoke test summary (pass/fail, shapes, loss curve)"
        files_in: []
        files_out:
          - results/<RUN>/smoke_test.json

# ─── O: Output ───────────────────────────────────────────────────
output:
  returns:
    status: ok
    verdict: <pass | fail>
  files_out:
    - results/<RUN>/smoke_test.json
