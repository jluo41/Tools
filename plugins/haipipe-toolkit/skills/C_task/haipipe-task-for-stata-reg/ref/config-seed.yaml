# configs/run_reg_<window>_<family>.yaml  --  reg-pipeline (Stata dialect)
# Per-run _meta: one file per RUNNAME. Output is LIGHT: coef tables land
# in results/<RUNNAME>/, NOT _WorkSpace/.
# Shared Stata globals (data path, data version) live in configs/<Cohort>.do.

_meta:
  purpose: |
    <e.g., OLS regressions (progressive, LPM, two-part, trait-form) for af14d window>
  note: |
    <e.g., workers 1,2,3,5; cluster npi_id; full controls>
  input: |
    <e.g., _WorkSpace/3-Data-Store/<Cohort>/<version>/ANALYSIS-CMS-Filter.dta>
  output: |
    <e.g., results/run_reg_af14d_ols/{log/, tables/}>
  # skip_review: true

# -- Run identity --
window: <af14d>           # outcome BFAF window; empty string for ols_windows
family: <ols>             # ols | iv | did | ols_windows
workers:                  # worker .do scripts this run calls (subset of scripts/)
  - run-1-*-ols-progressive.do
  - run-2-*-ols-lpm-logit.do
  - run-3-*-ols-twopart.do
  - run-5-*-ols-traitform.do
stata_config: <Cohort>_<Pairing>   # pointer to configs/<this>.do
