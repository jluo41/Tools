# =============================================================================
# Template for configs/<NAME>.yaml — inference-performance (latency) task
# =============================================================================

_meta:
  purpose: |
    <e.g., Profile warm inference latency of endpoint_sms_clickpred
     v0001smsr4-slenteng; locate the per-step bottleneck>
  note: |
    <e.g., 40-arm S-Learner. Baseline: total ~3.7s warm. Suspect the per-arm
     scoring loop. Decompose model_inference to confirm.>
  input: |
    <e.g., Endpoint_Set 6-EndpointStore/endpoint_sms_clickpred_v0001smsr4-slenteng
     + payload examples/example_001/payload.json>
  output: |
    results/<run>/latency.json — keys: per_step_ms{...}, model_inference_split{...},
    total_ms, slowest_step, n_arms, warm_iterations


# =============================================================================
# Profile params
# =============================================================================

# Path under _WorkSpace/6-EndpointStore/ (the packaged Endpoint_Set to profile)
endpoint_set_path: "_WorkSpace/6-EndpointStore/<endpoint_name>"

# A sample request payload (usually the endpoint's own bundled example)
payload_path: "_WorkSpace/6-EndpointStore/<endpoint_name>/examples/example_001/payload.json"

ProfileArgs:
  warm_iterations: 5                    # warm calls to median over (after 1 warm-up)
  decompose_model_inference: true       # split Step 6 into dataset-ops vs xgb predict
  arm_sweep: []                         # optional: e.g. [10, 20, 40] — needs a model per arm-count
  concurrency_sweep: []                 # optional: e.g. [1, 5, 10] for throughput
  save_full_response: false             # dump one inference response for inspection
