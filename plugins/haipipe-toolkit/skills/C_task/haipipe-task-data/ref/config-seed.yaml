# =============================================================================
# Template for configs/<NAME>.yaml — data-pipeline task
# =============================================================================
# Inherits the _meta: block convention from
# ../../haipipe-task/ref/config-meta-template.yaml.
# =============================================================================

_meta:
  purpose: |
    <e.g., Build CGM 5-min record dataset v3 for WellReadi cohort>
  note: |
    <e.g., Stride-4h; clean partitions; mirrors WellDoc v2 schema>
  input: |
    <e.g., 1-SourceStore/WellReadi v3; ExternalStore cohort lookup>
  output: |
    <e.g., 2-RecStore/CGM5Min/@v0003_wellreadi  (~360k patient-partitions)>


# =============================================================================
# Stage-specific params
# =============================================================================

stage: <1|2|3|4>                    # 1=Source 2=Record 3=Case 4=AIData
FnClass: <SourceFn|RecordFn|CaseFn|TfmFn|SplitFn>
Args:
  dataset_name: <dataset>           # e.g. wellreadi_v3, CGM5Min, EventGlucose
  version: <vNNNN>                  # e.g. v0003
  # ... stage-specific args (cohort, num_partitions, lookups, ...)

# Partitioning (stage 2+ typically uses this)
Partition_Args:
  num_processors_case: 2            # see "C3 mode" — concurrent writes constraint
  num_partitions: 20
