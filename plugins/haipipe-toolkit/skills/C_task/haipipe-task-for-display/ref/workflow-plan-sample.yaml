# workflow-plan-sample.yaml — display task script-level plan
# Schema: B_project/haipipe-workflow/ref/plan-schema.md
# Task-level template: ../haipipe-task/ref/workflow-template.yaml
#
# Typical display phases: Load → Plot → Export
# All outputs light (results/<run>/{*.pdf, *.png, *.tex, source_data.csv}).

# ─── Header ──────────────────────────────────────────────────────
name: figure-<NAME>
purpose: "Produce paper figure <NAME> from upstream eval results"
skill: haipipe-task-for-display

# ─── I: Input ────────────────────────────────────────────────────
input:
  args:
    config: configs/<RUN>.yaml
    figure_type: <figure | table>
  files_in:
    - <NN>_<TASK>.py
    - configs/<RUN>.yaml
    - results/<UPSTREAM_RUN>/metrics.json

# ─── P: Phases ───────────────────────────────────────────────────
phases:

  - title: Load
    detail: "load upstream metrics or data"
    steps:
      - label: "load:data"
        type: agent
        required: true
        prompt: "Load upstream results (metrics.json, source_data.csv)"
        files_in:
          - results/<UPSTREAM_RUN>/metrics.json
        files_out: []

  - title: Plot
    detail: "render figures or format tables"
    steps:
      - label: "plot:render"
        type: agent
        required: true
        prompt: "Render matplotlib/seaborn figure or LaTeX table"
        files_in: []
        files_out: []

      - label: "plot:annotate"
        type: agent
        required: false
        prompt: "Add annotations, significance markers, legends"
        files_in: []
        files_out: []

  - title: Export
    detail: "save publication-ready outputs"
    steps:
      - label: "export:figure"
        type: agent
        required: true
        prompt: "Save PDF + PNG + source_data.csv to results/<RUN>/"
        files_in: []
        files_out:
          - results/<RUN>/<FIGURE>.pdf
          - results/<RUN>/<FIGURE>.png
          - results/<RUN>/source_data.csv

      - label: "export:tex"
        type: agent
        required: false
        prompt: "Generate LaTeX include fragment (.tex)"
        files_in: []
        files_out:
          - results/<RUN>/<FIGURE>.tex

# ─── O: Output ───────────────────────────────────────────────────
output:
  returns:
    status: ok
  files_out:
    - results/<RUN>/<FIGURE>.pdf
    - results/<RUN>/<FIGURE>.png
    - results/<RUN>/source_data.csv
    - results/<RUN>/<FIGURE>.tex
