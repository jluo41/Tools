# workflow-plan-sample-data.yaml -- Stata data stage script-level plan
# Schema: B_project/haipipe-workflow/ref/plan-schema.md
# Phases: Setup -> FilterCase -> FilterExternal -> FullVariables -> Describe
# Heavy outputs land in _WorkSpace/*-Data-Store/.

# --- Preview -----------------------------------------------------------
# data-pipeline -- cross-year analysis table assembly
#
# I: _WorkSpace/2-Case-Store/case_<cohort>_<source>/<asset>/year-*/
#    _WorkSpace/0-External-Store/<physician_traits>
#    configs/<Spec>.do
#
# +-- 🔧 P1: Setup
# |   +-- S1: load config, resolve paths
# |
# +-- 🧹 P2: FilterCase
# |   +-- S2: append per-year CASES, apply first-visit + age/year filters
# |
# +-- 🧹 P3: FilterExternal
# |   +-- S3: merge physician traits, apply MD/DO + review-count filters
# |
# +-- 🔨 P4: FullVariables
# |   +-- S4: derive treatment/outcome/control vars -> ANALYSIS-CMS-Filter.dta
# |
# +-- 📋 P5: Describe
# |   +-- S5: N, distinct benes/NPIs, year dist, treatment summary
#
# O: _WorkSpace/*-Data-Store/<asset>/ANALYSIS-CMS-Filter.dta
#    results/run_data_<Spec>/summary.txt + log/
# -------------------------------------------------------------------

name: data-<SPEC>
purpose: "Assemble cross-year regression-ready analysis table for <SPEC>"
skill: haipipe-task-for-stata

input:
  args:
    config: configs/<SPEC>.do
  files_in:
    - data_pipeline.do
    - configs/<SPEC>.do
    - _WorkSpace/2-Case-Store/case_<COHORT>_<SOURCE>/<ASSET>/year-*/
    - _WorkSpace/0-External-Store/<PHYSICIAN_TRAITS>

phases:

  - title: Setup
    detail: "load config, resolve _WorkSpace paths"
    steps:
      - label: "setup:config"
        type: agent
        required: true
        prompt: "Load config, resolve case-store and external-store paths"
        files_in:
          - configs/<SPEC>.do
        files_out: []

  - title: FilterCase
    detail: "append per-year CASES, apply first-visit + age/year filters"
    steps:
      - label: "filter-case:append-filter"
        type: agent
        required: true
        prompt: "Append per-year CASES from Case-Store, apply first-visit rule, age/year window, cancer exclusion"
        files_in:
          - _WorkSpace/2-Case-Store/case_<COHORT>_<SOURCE>/<ASSET>/year-*/
        files_out: []

  - title: FilterExternal
    detail: "merge physician traits + policy, apply MD/DO + review-count filters"
    steps:
      - label: "filter-external:merge-filter"
        type: agent
        required: true
        prompt: "Merge physician personality traits, apply MD/DO filter, review-count filter"
        files_in:
          - _WorkSpace/0-External-Store/<PHYSICIAN_TRAITS>
        files_out: []

  - title: FullVariables
    detail: "derive treatment/outcome/control variables, write analysis table"
    steps:
      - label: "full-variables:derive"
        type: agent
        required: true
        prompt: "Derive treatment/outcome/control variables, write ANALYSIS-CMS-Filter.dta"
        files_in: []
        files_out:
          - _WorkSpace/<N>-Data-Store/<DATA_ASSET>/ANALYSIS-CMS-Filter.dta

  - title: Describe
    detail: "QC summary of the analysis table"
    steps:
      - label: "describe:summary"
        type: agent
        required: true
        prompt: "N rows, distinct benes/NPIs, year dist, treatment summary, outcome means, missingness"
        files_in: []
        files_out:
          - results/run_data_<SPEC>/summary.txt

output:
  returns:
    status: ok
  files_out:
    - _WorkSpace/<N>-Data-Store/<DATA_ASSET>/ANALYSIS-CMS-Filter.dta
    - results/run_data_<SPEC>/summary.txt
    - results/run_data_<SPEC>/log/
