# =============================================================================
# configs/run_data_<Spec>.yaml  —  data-pipeline (Stata dialect)
# =============================================================================
# Carries ONLY the _meta: block + a pointer to the Stata spec config.
# Filter rules + variable lists live in configs/<Spec>.do (source of truth).
# Cross-year stage: there is NO year axis here.
# =============================================================================

_meta:
  purpose: |
    <e.g., Assemble 1st-pair OpioidRx × VisitLBP analysis table across 2015-2020>
  note: |
    <e.g., first-visit only; MD/DO; review-count 5-100; policy merge ON>
  input: |
    <e.g., 2-Case-Store/case_lbp/.../year-*/ CASES + BFAF panels; physician-trait + policy assets>
  output: |
    <e.g., *-Data-Store/.../ANALYSIS-CMS-Filter.dta; headline N rows / N physicians>
  # skip_review: true

# ── Run identity (Stata dialect) ─────────────────────────────────────────────
stata_config: <Spec>            # → configs/<Spec>.do  (e.g. 1stPairOpioidRx_VisitLBP)
spec: <1stPairOpioidRx_VisitLBP>
steps: [filter_case, filter_external, full_variables, describe, summary]
asset: <v0001_...>              # *-Data-Store/<asset>/
