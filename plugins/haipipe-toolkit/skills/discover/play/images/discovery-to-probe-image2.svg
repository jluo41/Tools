<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Discovery to Probe</title>
  <desc id="desc">A Discovery verdict is consumed by Probe alongside Task metrics. Insight receives only reviewed reusable synthesis.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#243746"/>
    </marker>
    <style>
      .bg { fill: #f7f4ee; }
      .note { fill: #ffffff; stroke: #243746; stroke-width: 2.5; rx: 18; }
      .probe { fill: #eaf4f0; stroke: #477565; stroke-width: 2.5; rx: 18; }
      .task { fill: #edf2fb; stroke: #536e9f; stroke-width: 2.5; rx: 18; }
      .insight { fill: #f3ecfa; stroke: #7b5aa6; stroke-width: 2.5; rx: 18; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #1f2a33; }
      .text { font-family: Inter, Arial, sans-serif; font-size: 17px; fill: #31424f; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 15px; fill: #52636f; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #243746; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 15px; fill: #31424f; }
      .line { stroke: #243746; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #8999a3; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text x="72" y="72" class="title">Discovery feeds Probe; it does not become Insight by itself</text>
  <text x="72" y="104" class="text">Outside evidence and inside execution meet at the claim gate.</text>

  <rect class="note" x="70" y="178" width="300" height="190"/>
  <text x="104" y="220" class="label">Discovery Note</text>
  <text x="104" y="258" class="mono">Verdict: inconclusive</text>
  <text x="104" y="292" class="small">outside sources motivate</text>
  <text x="104" y="318" class="small">the empirical probe</text>

  <rect class="task" x="70" y="430" width="300" height="150"/>
  <text x="104" y="472" class="label">Task Outputs</text>
  <text x="104" y="510" class="small">top-k overlap</text>
  <text x="104" y="536" class="small">rank correlation</text>
  <text x="104" y="562" class="small">entity drift</text>

  <rect class="probe" x="500" y="255" width="300" height="170"/>
  <text x="534" y="298" class="label">Probe</text>
  <text x="534" y="336" class="text">claim gate</text>
  <text x="534" y="368" class="small">outside evidence + inside metrics</text>

  <rect class="note" x="890" y="190" width="240" height="120"/>
  <text x="922" y="232" class="label">Probe Verdict</text>
  <text x="922" y="268" class="small">claim holds, fails,</text>
  <text x="922" y="292" class="small">or needs more work</text>

  <rect class="insight" x="890" y="410" width="240" height="120"/>
  <text x="922" y="452" class="label">Insight</text>
  <text x="922" y="488" class="small">only reusable synthesis</text>
  <text x="922" y="512" class="small">after post/review</text>

  <path class="line" d="M370 273 C435 273 450 300 495 320"/>
  <path class="line" d="M370 505 C438 505 450 388 495 365"/>
  <path class="line" d="M800 326 C842 300 850 260 885 248"/>
  <path class="muted" d="M800 382 C842 430 850 462 885 470"/>

  <text x="396" y="252" class="small">outside verdict</text>
  <text x="396" y="544" class="small">inside metrics</text>
  <text x="820" y="282" class="small">judgement</text>
  <text x="814" y="448" class="small">post later</text>
</svg>
